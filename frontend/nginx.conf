server {
    listen 5000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Strip the ingress path prefix so the app works whether the
    # ingress controller rewrites the path (rewrite-target: /) or
    # forwards it as-is to this container.
    rewrite ^/fraudos-fe/?(.*)$ /$1 last;

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api requests to the backend — URL injected by envsubst at container start.
    # Location is /api/ (not /api/) so local Docker works without an ingress controller.
    # In production the ingress routes /api/ directly to the backend before nginx sees it,
    # so this block is only exercised locally.
    location /api/ {
        proxy_pass ${VITE_API_URL}/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Rewrite Location headers from the backend's internal address back to the
        # browser-visible host so FastAPI trailing-slash redirects (307) are followed
        # through nginx and not directly to the Docker-internal hostname.
        proxy_redirect ${VITE_API_URL}/ /api/;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
